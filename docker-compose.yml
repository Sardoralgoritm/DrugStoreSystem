services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Seed__AdminEmail: ${ADMIN_EMAIL}
      Seed__AdminPassword: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/src/src/DrugstoreSystem.Web/logs
    networks:
      - drugstore

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drugstore}
      POSTGRES_USER: ${POSTGRES_USER:-drugstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drugstore} -d ${POSTGRES_DB:-drugstore}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - drugstore

volumes:
  pgdata:

networks:
  drugstore:
    driver: bridge
